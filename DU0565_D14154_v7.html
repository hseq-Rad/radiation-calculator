<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sentinel Delta 880 Ir-192</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 760px;
      margin: auto;
      padding: 20px;
      background: #F5F8FB;
      color: #002a5c;
    }
    h1 {
      text-align: center;
      margin: 6px 0 14px 0;
      font-size: 1.7rem;
    }
    .info-box, .result {
      background: #fff;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      padding: 14px;
      margin-top: 14px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95em;
    }
    td {
      padding: 6px 4px;
    }
    label {
      font-weight: bold;
      display: block;
      margin-top: 14px;
    }
    input, button {
      padding: 10px;
      margin-top: 4px;
      width: 100%;
      border-radius: 4px;
      border: 1px solid #bbb;
      box-sizing: border-box;
    }
    button {
      background: #002a5c;
      color: #fff;
      border: none;
      cursor: pointer;
      margin-top: 18px;
    }
    .field-pair {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 20px;
    }
    .field-pair p {
      width: 48%;
      margin: 6px 0;
    }
    .highlight {
      font-weight: bold;
      color: #000;
    }
    h2, h3 {
      margin-bottom: 10px;
    }
    hr {
      margin: 14px 0;
      border: 0;
      border-top: 1px solid #d8dee9;
    }
  </style>
</head>
<body>

<h1>Sentinel Delta 880 Ir-192</h1>

<div class="info-box">
  <table>
    <tr><td><strong>Container</strong></td><td>DU0565</td></tr>
    <tr><td><strong>Source</strong></td><td>Ir-192</td></tr>
    <tr><td><strong>Source number</strong></td><td>D14154</td></tr>
    <tr><td><strong>Reference date</strong></td><td>17-04-2026</td></tr>
    <tr><td><strong>Source strength</strong></td><td>51.25 Ci</td></tr>
    <tr><td><strong>Material</strong></td><td>Carbon Steel (CS)</td></tr>
    <tr><td><strong>HVL</strong></td><td>8.0 mm</td></tr>
  </table>
</div>

<label>Object thickness (mm CS)</label>
<input type="number" id="thickness" value="16" min="0" step="0.1">

<label>Source-to-object distance (mm)</label>
<input type="number" id="distance" value="300" min="1" step="1">

<label>Usage date</label>
<input type="date" id="date1" value="2026-04-17">

<button onclick="calc()">Calculate</button>

<div id="out" class="result" style="display:none"></div>

<script>
const act0 = 51.25;              // Ci
const refDate = "2026-04-17";
const halfLife = 74;             // days
const refDose = 127;             // µSv/h per GBq at 1 m
const HVL = 8.0;                // mm CS

function parseDate(d) {
  const p = d.split("-");
  return new Date(Number(p[0]), Number(p[1]) - 1, Number(p[2]));
}

function calc() {
  const d = document.getElementById("date1").value;
  const thickness = Number(document.getElementById("thickness").value);
  const distanceMm = Number(document.getElementById("distance").value);

  if (!d) {
    alert("Please select a usage date.");
    return;
  }
  if (isNaN(thickness) || thickness < 0) {
    alert("Please enter a valid object thickness.");
    return;
  }
  if (isNaN(distanceMm) || distanceMm <= 0) {
    alert("Please enter a valid source-to-object distance.");
    return;
  }

  const dt = (parseDate(d) - parseDate(refDate)) / (1000 * 3600 * 24);

  const act = act0 * Math.pow(2, -dt / halfLife);     // Ci
  const GBq = act * 37;

  // Constant on beam axis: Dose(r) = K / r^2
  // Since refDose is given at 1 m, K = dose at 1 m * 1^2
  const K = GBq * refDose; // µSv/h·m²

  const distanceM = distanceMm / 1000;

  // Free beam dose at 1 m from source
  const doseFree1m = K;

  // Free beam dose at object location
  const doseAtObjectFree = K / (distanceM * distanceM);

  // Transmission through carbon steel
  const trans = Math.pow(0.5, thickness / HVL);

  // Dose immediately after object
  const doseAfterObject = doseAtObjectFree * trans;

  // Solve for total distance from source where dose = limit
  function totalDistanceFor(limit) {
    return Math.sqrt((K * trans) / limit);
  }

  const total10 = totalDistanceFor(10);
  const total40 = totalDistanceFor(40);

  // Additional distance beyond object
  const extra10 = Math.max(0, total10 - distanceM);
  const extra40 = Math.max(0, total40 - distanceM);

  document.getElementById("out").innerHTML =
    '<h2>Results</h2>' +
    '<div class="field-pair"><p>Activity</p><p class="highlight">' + act.toFixed(2) + ' Ci (' + GBq.toFixed(0) + ' GBq)</p></div>' +
    '<div class="field-pair"><p>Dose @ 1 m free</p><p class="highlight">' + doseFree1m.toFixed(0) + ' µSv/h</p></div>' +
    '<div class="field-pair"><p>Dose at object (free beam)</p><p class="highlight">' + doseAtObjectFree.toFixed(0) + ' µSv/h</p></div>' +
    '<div class="field-pair"><p>Transmission factor through CS</p><p class="highlight">' + trans.toFixed(4) + '</p></div>' +
    '<div class="field-pair"><p>Dose just after object</p><p class="highlight">' + doseAfterObject.toFixed(0) + ' µSv/h</p></div>' +
    '<hr>' +
    '<h3>Required distance behind object</h3>' +
    '<div class="field-pair"><p>Additional distance for 10 µSv/h</p><p class="highlight">' + extra10.toFixed(2) + ' m</p></div>' +
    '<div class="field-pair"><p>Additional distance for 40 µSv/h</p><p class="highlight">' + extra40.toFixed(2) + ' m</p></div>' +
    '<hr>' +
    '<h3>Total distance from source</h3>' +
    '<div class="field-pair"><p>Total distance for 10 µSv/h</p><p class="highlight">' + total10.toFixed(2) + ' m</p></div>' +
    '<div class="field-pair"><p>Total distance for 40 µSv/h</p><p class="highlight">' + total40.toFixed(2) + ' m</p></div>';

  document.getElementById("out").style.display = 'block';
}
</script>

</body>
</html>
